name: skillcoach
version: "1.0.0"
description: "A Socratic debugging tutor environment where an AI agent teaches coding skills through hints and questions, never direct answers."
author: "SkillCoach Team"
tags:
  - education
  - coding
  - debugging
  - socratic
  - openenv
tasks:
  - name: identify-error
    difficulty: easy
    max_steps: 1
    description: "Identify the error type in buggy code without revealing the fix"
  - name: hint-without-answer
    difficulty: medium
    max_steps: 1
    description: "Give a useful diagnostic hint without revealing the solution"
  - name: guided-debugging
    difficulty: hard
    max_steps: 5
    description: "Guide student to find the bug using only questions over multiple turns"
observation_space:
  student_message: string
  buggy_code: string
  error_message: string
  turn: integer
  task_name: string
  history: list
action_space:
  response: string
reward_range: [0.01, 0.99]
